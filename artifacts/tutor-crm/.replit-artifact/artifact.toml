kind = "web"
previewPath = "/"
title = "Tutor Marketplace CRM"
version = "1.0.0"
id = "artifacts/tutor-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20360

[services.development]
run = "pnpm --filter @workspace/tutor-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tutor-crm", "run", "build" ]
publicDir = "artifacts/tutor-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20360"
BASE_PATH = "/"
